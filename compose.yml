name: homelab

# ---------- DRY helpers ----------
x-ls-common: &ls-common
  restart: unless-stopped
  environment:
    - PUID=${PUID}
    - PGID=${PGID}
    - TZ=${TZ}
    # Optional: make downloaded/created files group-writable
    - UMASK=002
  networks:
    - homelab
  logging:
    driver: json-file
    options:
      max-size: '10m'
      max-file: '3'

# ---------- Services ----------
services:
  overseerr:
    <<: *ls-common
    image: lscr.io/linuxserver/overseerr:latest
    container_name: overseerr
    volumes:
      - ${APPDATA}/overseerr:/config
    ports:
      - '5055:5055'
    labels:
      - dashy=include

  flaresolverr:
    # not linuxserver; keep light, still join homelab + logging limits
    restart: unless-stopped
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - LOG_HTML=false
      - CAPTCHA_SOLVER=none
      - TZ=${TZ}
    networks:
      - homelab
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    ports:
      - '8191:8191'
    labels:
      - dashy.ignore=true

  dashy:
    image: lissy93/dashy:latest
    container_name: dashy
    environment:
      - NODE_ENV=production
      - TZ=${TZ}
    networks: [homelab]
    ports:
      - '4000:8080' # Open at http://<server>:4000
    volumes:
      - ${APPDATA}/dashy/conf.yml:/app/user-data/conf.yml
      - ${APPDATA}/dashy/assets:/app/public
    healthcheck:
      test: ['CMD', 'node', '/app/services/healthcheck']
      interval: 90s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    labels:
      - dashy.ignore=true

  dashy-docker-sync:
    image: ghcr.io/jeppestaerk/dashy-docker-sync:latest
    container_name: dashy-docker-sync
    depends_on: [dashy]
    environment:
      - DASHY_CONFIG_PATH=/config/conf.yml
      - DASHY_DOCKER_SECTION_NAME=Docker Apps
      - DASHY_EXPOSED_BY_DEFAULT=false # only include containers with explicit labels
      - DASHY_DOCKER_URL_HOST=${HOST_ADDR} # base URL used for links
      - TZ=${TZ}
    networks: [homelab]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${APPDATA}/dashy/conf.yml:/config/conf.yml
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    labels:
      - dashy.ignore=true

  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    networks: [homelab]
    # Publish only what you need to reach from LAN
    ports:
      - '32400:32400/tcp' # Plex web/API
      # If you actually use DLNA/auto-discovery, also add these:
      - '1900:1900/udp' # SSDP discovery
      - '32410:32410/udp' # GDM discovery
      - '32412:32412/udp'
      - '32413:32413/udp'
      - '32414:32414/udp'
      - '32469:32469/tcp' # DLNA
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - VERSION=docker
      # REMOVE if previously used:
      # - PLEX_CLAIM=claim-Ti-QgP1Ezyxfa7G8Bd8H
      - ADVERTISE_IP=http://10.0.0.142:32400/
    volumes:
      # Make paths match the *arr containers to avoid path-mapping pain
      - ${DATA_DIR}:/data
      - ${APPDATA}/plex:/config
    labels:
      - dashy=include
      - dashy.port=32400
      - dashy.name=Plex
      - dashy.icon=png/plex.png
      - dashy.url=${HOST_ADDR}:32400/web
    restart: unless-stopped

  # # Try plex in hostmode
  # plex:
  #   image: lscr.io/linuxserver/plex:latest
  #   container_name: plex
  #   network_mode: host # <= key change
  #   environment:
  #     - PUID=${PUID}
  #     - PGID=${PGID}
  #     - TZ=${TZ}
  #     - VERSION=docker
  #     # Remove the claim once the server is already claimed
  #     # - PLEX_CLAIM=
  #     # Optional but helpful so clients learn the right URL:
  #     - ADVERTISE_IP=${HOST_ADDR}:32400/

  #   volumes:
  #     # Make paths match the *arr containers to avoid path-mapping pain
  #     - ${DATA_DIR}:/data
  #     - ${APPDATA}/plex:/config
  #   labels:
  #     - dashy=include
  #     - dashy.port=32400
  #     - dashy.name=Plex
  #     - dashy.icon=png/plex.png
  #     - dashy.url=${HOST_ADDR}:32400/web
  #   restart: unless-stopped

  qbittorrent:
    <<: *ls-common
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - WEBUI_PORT=8080
    volumes:
      - ${APPDATA}/qbittorrent:/config
      - ${DATA_DIR}/torrents:/data/torrents
    ports:
      - '8080:8080'
      - '6881:6881'
      - '6881:6881/udp'
    labels:
      - dashy=include # optional if you keep EXPOSED_BY_DEFAULT=true
      - dashy.port=8080 # <-- force the Web UI port for Dashy
      - dashy.name=qBittorrent
    stop_grace_period: 30s # Let qB save state cleanly

  radarr:
    <<: *ls-common
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    volumes:
      - ${APPDATA}/radarr:/config
      - ${DATA_DIR}:/data
    ports:
      - '7878:7878'
    labels:
      - dashy=include

  sonarr:
    <<: *ls-common
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    volumes:
      - ${APPDATA}/sonarr:/config
      - ${DATA_DIR}:/data
    ports:
      - '8989:8989'
    labels:
      - dashy=include

  prowlarr:
    <<: *ls-common
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    volumes:
      - ${APPDATA}/prowlarr:/config
    ports:
      - '9696:9696'
    labels:
      - dashy=include

  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    env_file: .env
    volumes:
      - ${UPLOAD_LOCATION}:/data
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - redis
      - database
    ports:
      - '2283:2283' # or "8088:2283" if you prefer that external port
    restart: always
    networks: [homelab]
    labels:
      - dashy=include
      - dashy.name=Immich
      - dashy.port=2283
      - dashy.url=${HOST_ADDR}:2283
      - dashy.icon=https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/immich.png

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    env_file: .env
    volumes:
      - model-cache:/cache
    restart: always
    networks: [homelab]
    labels:
      - dashy.ignore=true

  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:8-bookworm@sha256:a137a2b60aca1a75130022d6bb96af423fefae4eb55faf395732db3544803280
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli ping || exit 1']
    restart: always
    networks: [homelab]
    labels:
      - dashy.ignore=true

  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:32324a2f41df5de9efe1af166b7008c3f55646f8d0e00d9550c16c9822366b4a
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
      # DB_STORAGE_TYPE: "HDD"   # uncomment if your DB is on HDD
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    shm_size: 128mb
    restart: always
    networks: [homelab]
    labels:
      - dashy.ignore=true

  netdata:
    image: netdata/netdata:stable
    container_name: netdata
    # Keep host PID so Netdata can see host processes; just switch network
    pid: host
    networks: [homelab]
    ports:
      - '19999:19999/tcp'
    restart: unless-stopped
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - ./appdata/netdata/config:/etc/netdata
      - ./appdata/netdata/lib:/var/lib/netdata
      - ./appdata/netdata/cache:/var/cache/netdata
      - /:/host/root:ro,rslave
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /var/log:/host/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - dashy=include
      - dashy.port=19999
      - dashy.name=Netdata
      - dashy.icon=png/netdata.png
      - dashy.url=${HOST_ADDR}:19999

volumes:
  model-cache:

# ---------- Networks ----------
networks:
  homelab:
    name: homelab
