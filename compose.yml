name: homelab

# ---------- DRY helpers ----------
x-ls-common: &ls-common
  restart: unless-stopped
  environment:
    - PUID=${PUID}
    - PGID=${PGID}
    - TZ=${TZ}
    # Optional: make downloaded/created files group-writable
    - UMASK=002
  networks:
    - homelab
  logging:
    driver: json-file
    options:
      max-size: '10m'
      max-file: '3'

# ---------- Services ----------
services:
  overseerr:
    <<: *ls-common
    image: lscr.io/linuxserver/overseerr:latest
    container_name: overseerr
    volumes:
      - ${APPDATA}/overseerr:/config
    ports:
      - '5055:5055'

  flaresolverr:
    # not linuxserver; keep light, still join homelab + logging limits
    restart: unless-stopped
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - LOG_HTML=false
      - CAPTCHA_SOLVER=none
      - TZ=${TZ}
    networks:
      - homelab
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    ports:
      - '8191:8191'

  homarr:
    image: ghcr.io/homarr-labs/homarr:latest
    container_name: homarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - SECRET_ENCRYPTION_KEY=013149d6571dd7fc5041f640a1a38c7afa8a5cd820ba07d1d6f4fe9404e8f543
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${APPDATA}/homarr/configs:/app/data/configs
      - ${APPDATA}/homarr/icons:/app/public/icons
      - ${APPDATA}/homarr/data:/appdata
    ports:
      - '7575:7575'
    restart: unless-stopped

  plex:
    # Keep host mode for DLNA/auto-discovery/perf (unchanged)
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - VERSION=docker
      # ⚠️ Use once, then remove this line after claiming:
      # - PLEX_CLAIM=claim-REPLACE_ME
    volumes:
      - ${APPDATA}/plex:/config
      - ${DATA_DIR}/media:/data
    restart: unless-stopped
    # (Optional hardware accel on Intel/AMD iGPU)
    # devices:
    #   - /dev/dri:/dev/dri

  qbittorrent:
    <<: *ls-common
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - WEBUI_PORT=8080
      - TORRENTING_PORT=6881
    volumes:
      - ${APPDATA}/qbittorrent:/config
      - ${DATA_DIR}/torrents:/data/torrents
    ports:
      - '8080:8080' # Web UI
      - '6881:6881' # TCP torrenting
      - '6881:6881/udp' # UDP torrenting
    stop_grace_period: 30s # Let qB save state cleanly

  radarr:
    <<: *ls-common
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    volumes:
      - ${APPDATA}/radarr:/config
      - ${DATA_DIR}:/data
    ports:
      - '7878:7878'

  sonarr:
    <<: *ls-common
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    volumes:
      - ${APPDATA}/sonarr:/config
      - ${DATA_DIR}:/data
    ports:
      - '8989:8989'

  prowlarr:
    <<: *ls-common
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    volumes:
      - ${APPDATA}/prowlarr:/config
    ports:
      - '9696:9696'

  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    env_file: .env
    volumes:
      - ${UPLOAD_LOCATION}:/data
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - redis
      - database
    ports:
      - '2283:2283' # or "8088:2283" if you prefer that external port
    restart: always
    networks: [homelab]

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    env_file: .env
    volumes:
      - model-cache:/cache
    restart: always
    networks: [homelab]

  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:8-bookworm@sha256:a137a2b60aca1a75130022d6bb96af423fefae4eb55faf395732db3544803280
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli ping || exit 1']
    restart: always
    networks: [homelab]

  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:32324a2f41df5de9efe1af166b7008c3f55646f8d0e00d9550c16c9822366b4a
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
      # DB_STORAGE_TYPE: "HDD"   # uncomment if your DB is on HDD
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    shm_size: 128mb
    restart: always
    networks: [homelab]

  netdata:
    image: netdata/netdata:stable
    container_name: netdata
    pid: host
    network_mode: host # drop your `ports:` when using host network
    restart: unless-stopped
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - ./appdata/netdata/config:/etc/netdata
      - ./appdata/netdata/lib:/var/lib/netdata
      - ./appdata/netdata/cache:/var/cache/netdata
      - /:/host/root:ro,rslave # <-- lets Netdata see ALL host mount points (incl. /srv/data)
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /var/log:/host/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  model-cache:

# ---------- Networks ----------
networks:
  homelab:
    name: homelab
